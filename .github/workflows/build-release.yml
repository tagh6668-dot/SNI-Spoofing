name: Build and Release Windows Executable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag Name'
        required: true
        default: 'v1.0.0-win'
      release_title:
        description: 'Release Title'
        required: true
        default: 'SNI-Spoofing v1.0.0 (Windows Portable)'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x86' # Force 32-bit compiler to ensure absolute compatibility on both 32-bit and 64-bit older Windows 10 versions

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download Official Signed WinDivert and Patch pydivert
      shell: powershell
      run: |
        $Version = "2.2.2"
        $Package = "2.2.2-A"
        $Url = "https://github.com/basil00/WinDivert/releases/download/v$Version/WinDivert-$Package.zip"
        
        Write-Host "Downloading WinDivert..."
        Invoke-WebRequest -Uri $Url -OutFile "windivert.zip"
        
        Write-Host "Extracting WinDivert..."
        Expand-Archive -Path "windivert.zip" -DestinationPath "windivert_temp"
        
        # Create output directory
        New-Item -ItemType Directory -Force -Path "dist_release"
        
        # Copy config.json
        Copy-Item "config.json" -Destination "dist_release/config.json"
        
        # Locate installed pydivert directory
        $PydivertPath = python -c "import pydivert, os; print(os.path.dirname(pydivert.__file__))"
        Write-Host "pydivert package path is: $PydivertPath"
        
        # Copy signed binaries into the release directory for our exe to load at runtime
        # Since our Python process is x86, we must copy the x86 WinDivert.dll!
        Copy-Item "windivert_temp/WinDivert-$Package/x86/WinDivert.dll" -Destination "dist_release/WinDivert.dll"
        Copy-Item "windivert_temp/WinDivert-$Package/x64/WinDivert64.sys" -Destination "dist_release/WinDivert64.sys"
        Copy-Item "windivert_temp/WinDivert-$Package/x86/WinDivert32.sys" -Destination "dist_release/WinDivert32.sys"
        
        # Overwrite pydivert's bundled files inside the python package to ensure PyInstaller bundles the correct ones
        # For amd64/x64
        $PydivertAmd64 = Join-Path $PydivertPath "dll\amd64"
        if (Test-Path $PydivertAmd64) {
            Write-Host "Patching pydivert amd64 dll folder with signed WinDivert 2.2.2..."
            Copy-Item "windivert_temp/WinDivert-$Package/x64/WinDivert.dll" -Destination (Join-Path $PydivertAmd64 "WinDivert.dll") -Force
            Copy-Item "windivert_temp/WinDivert-$Package/x64/WinDivert64.sys" -Destination (Join-Path $PydivertAmd64 "WinDivert64.sys") -Force
            Copy-Item "windivert_temp/WinDivert-$Package/x64/WinDivert64.sys" -Destination (Join-Path $PydivertAmd64 "WinDivert.sys") -Force
        }
        
        # For x86
        $PydivertX86 = Join-Path $PydivertPath "dll\x86"
        if (Test-Path $PydivertX86) {
            Write-Host "Patching pydivert x86 dll folder with signed WinDivert 2.2.2..."
            Copy-Item "windivert_temp/WinDivert-$Package/x86/WinDivert.dll" -Destination (Join-Path $PydivertX86 "WinDivert.dll") -Force
            Copy-Item "windivert_temp/WinDivert-$Package/x86/WinDivert32.sys" -Destination (Join-Path $PydivertX86 "WinDivert32.sys") -Force
            Copy-Item "windivert_temp/WinDivert-$Package/x86/WinDivert32.sys" -Destination (Join-Path $PydivertX86 "WinDivert.sys") -Force
        }
        
        # Clean up temp
        Remove-Item -Recurse -Force "windivert_temp"
        Remove-Item -Force "windivert.zip"

    - name: Compile Executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name SNI-Spoofing main.py

    - name: Prepare Final Package
      shell: powershell
      run: |
        # Copy compiled exe into the release folder
        Copy-Item "dist/SNI-Spoofing.exe" -Destination "dist_release/SNI-Spoofing.exe"
        
        # Create ZIP archive
        Compress-Archive -Path "dist_release/*" -DestinationPath "SNI-Spoofing-Windows.zip"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SNI-Spoofing-Windows
        path: SNI-Spoofing-Windows.zip

    - name: Create and Publish Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: ${{ github.event.inputs.release_title }}
        draft: false
        prerelease: false
        files: SNI-Spoofing-Windows.zip
        token: ${{ secrets.GITHUB_TOKEN }}
